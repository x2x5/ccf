<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CCF推荐国际学术会议和期刊目录 (2026年)</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f7fa; color: #333; line-height: 1.5; }
.container { max-width: 1400px; margin: 0 auto; padding: 20px; }
.header { text-align: center; margin-bottom: 20px; }
.header h1 { font-size: 26px; color: #1a1a2e; margin-bottom: 4px; }
.header .src { font-size: 12px; color: #999; }
.header .src a { color: #2563eb; }

.filters { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,.08); margin-bottom: 16px; }
.filter-row { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; margin-bottom: 12px; }
.filter-row:last-child { margin-bottom: 0; }
.filter-label { font-size: 13px; font-weight: 600; color: #555; min-width: 60px; flex-shrink: 0; }
.btn-group { display: flex; flex-wrap: wrap; gap: 4px; }
.btn { padding: 5px 14px; border: 1px solid #d0d5dd; border-radius: 6px; background: #fff; cursor: pointer; font-size: 13px; color: #333; transition: all .15s; }
.btn:hover { border-color: #2563eb; color: #2563eb; }
.btn.active { background: #2563eb; color: #fff; border-color: #2563eb; }

.direction-chips { display: flex; flex-wrap: wrap; gap: 6px; }
.chip { padding: 4px 12px; border-radius: 20px; border: 1px solid #d0d5dd; background: #fff; cursor: pointer; font-size: 12px; transition: all .15s; white-space: nowrap; }
.chip:hover { border-color: #2563eb; color: #2563eb; }
.chip.active { background: #2563eb; color: #fff; border-color: #2563eb; }

.search-row input { flex: 1; min-width: 200px; padding: 8px 14px; border: 1px solid #d0d5dd; border-radius: 8px; font-size: 14px; outline: none; }
.search-row input:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,.1); }

.publisher-select-wrap { position: relative; min-width: 200px; }
.publisher-select-wrap input { width: 100%; padding: 5px 12px; border: 1px solid #d0d5dd; border-radius: 6px; font-size: 13px; outline: none; }
.publisher-select-wrap input:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,.1); }
.publisher-dropdown { position: absolute; top: 100%; left: 0; right: 0; max-height: 240px; overflow-y: auto; background: #fff; border: 1px solid #d0d5dd; border-radius: 6px; box-shadow: 0 4px 12px rgba(0,0,0,.1); z-index: 100; display: none; }
.publisher-dropdown.show { display: block; }
.publisher-dropdown .opt { padding: 6px 12px; cursor: pointer; font-size: 13px; }
.publisher-dropdown .opt:hover { background: #f0f4ff; }
.publisher-dropdown .opt.selected { background: #2563eb; color: #fff; }
.pub-clear { margin-left: 4px; padding: 4px 10px; font-size: 12px; border: 1px solid #d0d5dd; border-radius: 6px; background: #fff; cursor: pointer; }
.pub-clear:hover { border-color: #ef4444; color: #ef4444; }

.stats { font-size: 13px; color: #666; padding: 8px 0; }

.table-wrap { background: #fff; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,.08); overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead th { background: #f8fafc; padding: 10px 14px; text-align: left; font-weight: 600; color: #475569; border-bottom: 2px solid #e2e8f0; white-space: nowrap; position: sticky; top: 0; z-index: 5; }
tbody td { padding: 8px 14px; border-bottom: 1px solid #f1f5f9; vertical-align: middle; }
tbody tr:hover { background: #f8fafc; }
tbody tr.level-A { border-left: 3px solid #ef4444; }
tbody tr.level-B { border-left: 3px solid #f59e0b; }
tbody tr.level-C { border-left: 3px solid #3b82f6; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; }
.badge-A { background: #fee2e2; color: #dc2626; }
.badge-B { background: #fef3c7; color: #d97706; }
.badge-C { background: #dbeafe; color: #2563eb; }
.type-badge { font-size: 11px; color: #666; }
a { color: #2563eb; text-decoration: none; }
a:hover { text-decoration: underline; }
.abbr { font-weight: 600; color: #1a1a2e; }

@media (max-width: 768px) {
  .filter-row { flex-direction: column; align-items: stretch; }
  .btn-group { flex-wrap: wrap; }
  .publisher-select-wrap { min-width: 100%; }
  thead th, tbody td { padding: 6px 8px; font-size: 12px; }
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>CCF 评级 2026 版</h1>
    <p class="src">数据来源参考 <a href="https://www.ccf.org.cn/Academic_Evaluation/By_category/" target="_blank" rel="noopener">https://www.ccf.org.cn/Academic_Evaluation/By_category/</a></p>
  </div>

  <div class="filters">
    <div class="filter-row search-row">
      <input type="text" id="searchInput" placeholder="🔍 搜索简称 / 全称 / 出版社..." style="flex:1">
    </div>

    <div class="filter-row">
      <span class="filter-label">大类</span>
      <div class="btn-group" id="typeFilters">
        <button class="btn active" data-value="">全部</button>
        <button class="btn" data-value="会议">会议</button>
        <button class="btn" data-value="期刊">期刊</button>
      </div>
      <span class="filter-label">研究方向</span>
      <div class="direction-chips" id="directionFilters"></div>
    </div>

    <div class="filter-row">
      <span class="filter-label">等级</span>
      <div class="btn-group" id="levelFilters">
        <button class="btn active" data-value="">全部</button>
        <button class="btn" data-value="A">A类</button>
        <button class="btn" data-value="B">B类</button>
        <button class="btn" data-value="C">C类</button>
      </div>
      <span class="filter-label">出版社</span>
      <div class="publisher-select-wrap" id="publisherWrap">
        <input type="text" id="publisherInput" placeholder="搜索出版社..." autocomplete="off">
        <div class="publisher-dropdown" id="publisherDropdown"></div>
      </div>
      <button class="pub-clear" id="pubClear">清除</button>
    </div>
  </div>

  <div class="stats" id="stats"></div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>大类</th>
          <th>等级</th>
          <th>研究方向</th>
          <th>简称</th>
          <th>全称</th>
          <th>出版社</th>
          <th>网址</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
</div>

<script>
const DIR_SHORT = {
  '计算机体系结构/并行与分布计算/存储系统': '体系结构/分布计算/存储系统',
  '计算机图形学与多媒体': '图形学与多媒体',
};

function shortDir(name) {
  return DIR_SHORT[name] || name;
}

let data = [];
let filtered = [];

const typeFilters = document.querySelectorAll('#typeFilters .btn');
const levelFilters = document.querySelectorAll('#levelFilters .btn');
const directionEl = document.getElementById('directionFilters');
const searchInput = document.getElementById('searchInput');
const publisherInput = document.getElementById('publisherInput');
const publisherDropdown = document.getElementById('publisherDropdown');
const pubClear = document.getElementById('pubClear');
const tableBody = document.getElementById('tableBody');
const statsEl = document.getElementById('stats');

let activeType = '';
let activeLevel = '';
let activeDirections = new Set();
let activePublisher = '';
let allPublishers = [];

async function loadData() {
  const res = await fetch('data.json');
  data = await res.json();

  const dirs = [...new Set(data.map(d => d.direction))];
  dirs.forEach(dir => {
    const chip = document.createElement('span');
    chip.className = 'chip';
    chip.textContent = shortDir(dir);
    chip.dataset.value = dir;
    chip.addEventListener('click', () => {
      chip.classList.toggle('active');
      if (chip.classList.contains('active')) {
        activeDirections.add(dir);
      } else {
        activeDirections.delete(dir);
      }
      applyFilters();
    });
    directionEl.appendChild(chip);
  });

  allPublishers = [...new Set(data.map(d => d.publisher))].sort();
  renderPublisherDropdown(allPublishers);

  applyFilters();
}

function renderPublisherDropdown(publishers) {
  publisherDropdown.innerHTML = '';
  publishers.forEach(p => {
    const div = document.createElement('div');
    div.className = 'opt' + (p === activePublisher ? ' selected' : '');
    div.textContent = p || '(空)';
    div.addEventListener('click', () => {
      activePublisher = p;
      publisherInput.value = p;
      publisherDropdown.classList.remove('show');
      applyFilters();
    });
    publisherDropdown.appendChild(div);
  });
}

publisherInput.addEventListener('focus', () => {
  publisherDropdown.classList.add('show');
});

publisherInput.addEventListener('input', () => {
  const q = publisherInput.value.toLowerCase();
  const filteredPubs = allPublishers.filter(p => p.toLowerCase().includes(q));
  renderPublisherDropdown(filteredPubs);
  publisherDropdown.classList.add('show');
});

document.addEventListener('click', (e) => {
  if (!document.getElementById('publisherWrap').contains(e.target)) {
    publisherDropdown.classList.remove('show');
  }
});

pubClear.addEventListener('click', () => {
  activePublisher = '';
  publisherInput.value = '';
  applyFilters();
});

typeFilters.forEach(btn => {
  btn.addEventListener('click', () => {
    typeFilters.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeType = btn.dataset.value;
    applyFilters();
  });
});

levelFilters.forEach(btn => {
  btn.addEventListener('click', () => {
    levelFilters.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeLevel = btn.dataset.value;
    applyFilters();
  });
});

searchInput.addEventListener('input', applyFilters);

function applyFilters() {
  filtered = data.filter(d => {
    if (activeType && d.type !== activeType) return false;
    if (activeLevel && d.level !== activeLevel) return false;
    if (activeDirections.size > 0 && !activeDirections.has(d.direction)) return false;
    if (activePublisher && d.publisher !== activePublisher) return false;

    const q = searchInput.value.trim().toLowerCase();
    if (q) {
      return d.abbr.toLowerCase().includes(q) ||
             d.name.toLowerCase().includes(q) ||
             d.publisher.toLowerCase().includes(q);
    }
    return true;
  });

  renderTable();
}

function renderTable() {
  if (filtered.length === 0) {
    tableBody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:40px;color:#999;">没有匹配的条目</td></tr>';
    statsEl.textContent = '共 0 条';
    return;
  }

  let html = '';
  filtered.forEach(d => {
    const urlHtml = d.url ? `<a href="${d.url}" target="_blank" rel="noopener">🔗 链接</a>` : '';
    html += `<tr class="level-${d.level}">
      <td><span class="type-badge">${d.type === '会议' ? '📋 会议' : '📘 期刊'}</span></td>
      <td><span class="badge badge-${d.level}">${d.level}类</span></td>
      <td>${shortDir(d.direction)}</td>
      <td class="abbr">${d.abbr || '-'}</td>
      <td>${d.name}</td>
      <td>${d.publisher}</td>
      <td>${urlHtml}</td>
    </tr>`;
  });
  tableBody.innerHTML = html;
  statsEl.textContent = `共 ${filtered.length} 条 (总 ${data.length} 条)`;
}

loadData();
</script>
</body>
</html>
