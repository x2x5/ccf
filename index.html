<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CCF-ABC（2026版）</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f7fa; color: #333; line-height: 1.5; }
.container { max-width: 1400px; margin: 0 auto; padding: 20px; }

.header { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; position: relative; }
.header h1 { font-size: 28px; flex-shrink: 0; line-height: 1; display: flex; }
.header h1 span { display: inline-block; }
.c1 { color: #ef4444; animation: swayLeft 2s ease-in-out infinite; transform-origin: bottom center; }
.c2 { color: #f59e0b; animation: swayLeft 2s ease-in-out infinite 0.3s; transform-origin: bottom center; }
.f-letter { color: #3b82f6; position: relative; animation: swayF 2s ease-in-out infinite 0.6s; transform-origin: bottom center; }
@keyframes swayLeft { 0%, 100% { transform: rotate(0deg) translateY(0); } 25% { transform: rotate(6deg) translateY(-1px); } 50% { transform: rotate(0deg) translateY(0); } 75% { transform: rotate(-6deg) translateY(-1px); } }
@keyframes swayF { 0%, 100% { transform: rotate(0deg); } 25% { transform: rotate(4deg); } 50% { transform: rotate(0deg); } 75% { transform: rotate(-4deg); } }
.header .search-input { flex: 1; max-width: 300px; min-width: 120px; padding: 6px 12px; border: 1px solid #d0d5dd; border-radius: 6px; font-size: 13px; outline: none; }
.header .search-input:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,.1); }
.header .src { font-size: 11px; color: #999; position: absolute; top: 20px; right: 20px; }
.header .src a { color: #999; text-decoration: none; }
.header .src a:hover { text-decoration: underline; }

.btn-group { display: inline-flex; gap: 4px; }
.btn { padding: 4px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600; transition: all .15s; border: 1.5px solid transparent; }
.btn-A { color: #dc2626; border-color: #fca5a5; background: #fff; }
.btn-A:hover { background: #fef2f2; }
.btn-A.active { background: #dc2626; color: #fff; border-color: #dc2626; }
.btn-B { color: #d97706; border-color: #fcd34d; background: #fff; }
.btn-B:hover { background: #fffbeb; }
.btn-B.active { background: #d97706; color: #fff; border-color: #d97706; }
.btn-C { color: #2563eb; border-color: #93c5fd; background: #fff; }
.btn-C:hover { background: #eff6ff; }
.btn-C.active { background: #2563eb; color: #fff; border-color: #2563eb; }

.dir-grid { background: #fff; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,.08); padding: 16px; margin-bottom: 16px; overflow-x: auto; }
.grid-row { display: grid; grid-template-columns: 84px repeat(10, 1fr); gap: 8px; align-items: center; margin-bottom: 8px; }
.grid-row:last-child { margin-bottom: 0; }
.grid-label { font-size: 12px; color: #666; text-align: center; font-weight: 500; }
.grid-label-btn { font-size: 12px; text-align: center; font-weight: 600; cursor: pointer; padding: 6px 8px; border-radius: 8px; border: 1.5px solid transparent; transition: all .15s; }
.grid-label-btn.conf { color: #0f766e; border-color: #5eead4; background: #fff; }
.grid-label-btn.conf:hover { background: #f0fdfa; }
.grid-label-btn.conf.active { background: #0d9488; color: #fff; border-color: #0d9488; }
.grid-label-btn.journal { color: #6d28d9; border-color: #c4b5fd; background: #fff; }
.grid-label-btn.journal:hover { background: #f5f3ff; }
.grid-label-btn.journal.active { background: #7c3aed; color: #fff; border-color: #7c3aed; }
.grid-card { padding: 6px 8px; border-radius: 8px; border: 1px solid #d0d5dd; background: #fff; cursor: pointer; transition: all .15s; text-align: center; }
.grid-card:hover { border-color: #2563eb; }
.grid-card .gc-main { font-size: 12px; font-weight: 500; line-height: 1.3; }
.grid-card .gc-sub { font-size: 10px; color: #888; line-height: 1.2; }
.grid-card.active { background: #2563eb; color: #fff; border-color: #2563eb; }
.grid-card.active .gc-sub { color: #bfdbfe; }
.grid-card.conf { border-color: #5eead4; }
.grid-card.conf .gc-main { color: #0f766e; }
.grid-card.conf.active { background: #0d9488; color: #fff; border-color: #0d9488; }
.grid-card.conf.active .gc-main { color: #fff; }
.grid-card.conf.active .gc-sub { color: #ccfbf1; }
.grid-card.conf:hover { border-color: #0d9488; }
.grid-card.journal { border-color: #c4b5fd; }
.grid-card.journal .gc-main { color: #6d28d9; }
.grid-card.journal.active { background: #7c3aed; color: #fff; border-color: #7c3aed; }
.grid-card.journal.active .gc-main { color: #fff; }
.grid-card.journal.active .gc-sub { color: #ede9fe; }
.grid-card.journal:hover { border-color: #7c3aed; }
.label-conf { color: #0f766e; font-weight: 600; }
.label-journal { color: #6d28d9; font-weight: 600; }

.table-wrap { background: #fff; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,.08); overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead th { background: #f8fafc; padding: 10px 14px; text-align: left; font-weight: 600; color: #475569; border-bottom: 2px solid #e2e8f0; white-space: nowrap; position: sticky; top: 0; z-index: 5; }
tbody td { padding: 8px 14px; border-bottom: 1px solid #f1f5f9; vertical-align: middle; }
tbody tr:hover { background: #f8fafc; }
tbody tr.level-A { border-left: 3px solid #ef4444; }
tbody tr.level-B { border-left: 3px solid #f59e0b; }
tbody tr.level-C { border-left: 3px solid #3b82f6; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; }
.badge-A { background: #fee2e2; color: #dc2626; }
.badge-B { background: #fef3c7; color: #d97706; }
.badge-C { background: #dbeafe; color: #2563eb; }
.type-badge-conf { font-size: 12px; font-weight: 600; color: #0d9488; }
.type-badge-journal { font-size: 12px; font-weight: 600; color: #7c3aed; }
a { color: #2563eb; text-decoration: none; }
a:hover { text-decoration: underline; }
.abbr { font-weight: 600; color: #1a1a2e; }

@media (max-width: 768px) {
  .header .search-input { max-width: 100%; }
  .dir-grid { padding: 10px; }
  .grid-card { padding: 4px 6px; }
  thead th, tbody td { padding: 6px 8px; font-size: 12px; }
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1><span class="c1">C</span><span class="c2">C</span><span class="f-letter">F</span></h1>
    <div class="btn-group" id="levelFilters">
      <button class="btn btn-A" data-value="A">A</button>
      <button class="btn btn-B" data-value="B">B</button>
      <button class="btn btn-C" data-value="C">C</button>
    </div>
    <input type="text" class="search-input" id="searchInput" placeholder="🔍 搜索简称 / 全称 / 出版社...">
    <span class="src"><a href="https://www.ccf.org.cn/Academic_Evaluation/By_category/" target="_blank" rel="noopener">数据来源：2026版推荐目录</a></span>
  </div>

  <div class="dir-grid" id="dirGrid"></div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>类型</th>
          <th>等级</th>
          <th>研究方向</th>
          <th>简称</th>
          <th>全称</th>
          <th>出版社</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
</div>

<script>
const DIR_ORDER = [
  { dir: '人工智能', short: '人工智能', conf: 'NeurIPS', journal: 'TPAMI' },
  { dir: '计算机图形学与多媒体', short: '图形学与多媒体', conf: 'SIGGRAPH', journal: 'TOG' },
  { dir: '交叉/综合/新兴', short: '交叉综合', conf: 'WWW', journal: 'JACM' },
  { dir: '网络与信息安全', short: '信息安全', conf: 'CCS', journal: 'TIFS' },
  { dir: '计算机网络', short: '计算机网络', conf: 'SIGCOMM', journal: 'ToN' },
  { dir: '人机交互与普适计算', short: '人机交互', conf: 'CHI', journal: 'TOCHI' },
  { dir: '软件工程/系统软件/程序设计语言', short: '软件工程', conf: 'ICSE', journal: 'TSE' },
  { dir: '计算机科学理论', short: '计算机理论', conf: 'STOC', journal: 'SICOMP' },
  { dir: '计算机体系结构/并行与分布计算/存储系统', short: '体系存储', conf: 'ASPLOS', journal: 'TOCS' },
  { dir: '数据库/数据挖掘/内容检索', short: '数据挖掘', conf: 'SIGMOD', journal: 'TKDE' },
];

const DIR_SHORT = {};
DIR_ORDER.forEach(d => { DIR_SHORT[d.dir] = d.short; });
function shortDir(name) { return DIR_SHORT[name] || name; }

let data = [];
let filtered = [];

const levelFilters = document.querySelectorAll('#levelFilters .btn');
const searchInput = document.getElementById('searchInput');
const tableBody = document.getElementById('tableBody');
const dirGrid = document.getElementById('dirGrid');

let activeLevels = new Set();
let activeDirection = '';
let activeType = '';

function buildGrid() {
  const rows = [
    { label: '研究方向', key: 'dir', class: '' },
    { label: '代表会议', key: 'conf', class: 'conf' },
    { label: '代表期刊', key: 'journal', class: 'journal' },
  ];

  rows.forEach(r => {
    const row = document.createElement('div');
    row.className = 'grid-row';

    if (r.key === 'dir') {
      const label = document.createElement('div');
      label.className = 'grid-label';
      label.textContent = r.label;
      row.appendChild(label);
    } else {
      const btn = document.createElement('div');
      btn.className = 'grid-label-btn ' + r.class;
      btn.textContent = r.label;
      btn.addEventListener('click', () => {
        btn.classList.toggle('active');
        if (btn.classList.contains('active')) {
          activeType = r.key === 'conf' ? '会议' : '期刊';
          activeDirection = '';
          document.querySelectorAll('.grid-card.conf, .grid-card.journal').forEach(c => c.classList.remove('active'));
          document.querySelectorAll('.grid-row:first-child .grid-card').forEach(c => c.classList.remove('active'));
          document.querySelectorAll('.grid-label-btn').forEach(b => { if (b !== btn) b.classList.remove('active'); });
        } else {
          activeType = '';
        }
        applyFilters();
      });
      row.appendChild(btn);
    }

    DIR_ORDER.forEach(d => {
      const card = document.createElement('div');
      card.className = 'grid-card' + (r.class ? ' ' + r.class : '');
      card.dataset.dir = d.dir;

      if (r.key === 'dir') {
        card.innerHTML = `<div class="gc-main">${d.short}</div>`;
        card.addEventListener('click', () => {
          card.classList.toggle('active');
          if (card.classList.contains('active')) {
            activeDirection = d.dir;
            activeType = '';
            document.querySelectorAll('.grid-row:first-child .grid-card').forEach(c => {
              if (c !== card) c.classList.remove('active');
            });
            document.querySelectorAll('.grid-card.conf, .grid-card.journal').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.grid-label-btn').forEach(b => b.classList.remove('active'));
          } else {
            activeDirection = '';
          }
          applyFilters();
        });
      } else if (r.key === 'conf') {
        card.innerHTML = `<div class="gc-main">${d.conf}</div>`;
        card.addEventListener('click', () => {
          const wasActive = card.classList.contains('active');
          document.querySelectorAll('.grid-card.conf').forEach(c => c.classList.remove('active'));
          document.querySelectorAll('.grid-card.journal').forEach(c => c.classList.remove('active'));
          document.querySelectorAll('.grid-row:first-child .grid-card').forEach(c => c.classList.remove('active'));
          document.querySelectorAll('.grid-label-btn').forEach(b => b.classList.remove('active'));
          if (!wasActive) {
            card.classList.add('active');
            activeDirection = d.dir;
            activeType = '会议';
          } else {
            activeDirection = '';
            activeType = '';
          }
          applyFilters();
        });
      } else {
        card.innerHTML = `<div class="gc-main">${d.journal}</div>`;
        card.addEventListener('click', () => {
          const wasActive = card.classList.contains('active');
          document.querySelectorAll('.grid-card.journal').forEach(c => c.classList.remove('active'));
          document.querySelectorAll('.grid-card.conf').forEach(c => c.classList.remove('active'));
          document.querySelectorAll('.grid-row:first-child .grid-card').forEach(c => c.classList.remove('active'));
          document.querySelectorAll('.grid-label-btn').forEach(b => b.classList.remove('active'));
          if (!wasActive) {
            card.classList.add('active');
            activeDirection = d.dir;
            activeType = '期刊';
          } else {
            activeDirection = '';
            activeType = '';
          }
          applyFilters();
        });
      }

      row.appendChild(card);
    });

    dirGrid.appendChild(row);
  });
}

async function loadData() {
  const res = await fetch('data.json');
  data = await res.json();
  buildGrid();
  applyFilters();
}

levelFilters.forEach(btn => {
  btn.addEventListener('click', () => {
    btn.classList.toggle('active');
    const v = btn.dataset.value;
    if (btn.classList.contains('active')) activeLevels.add(v);
    else activeLevels.delete(v);
    applyFilters();
  });
});

searchInput.addEventListener('input', applyFilters);

function applyFilters() {
  filtered = data.filter(d => {
    if (activeDirection && d.direction !== activeDirection) return false;
    if (activeType && d.type !== activeType) return false;
    if (activeLevels.size > 0 && !activeLevels.has(d.level)) return false;
    const q = searchInput.value.trim().toLowerCase();
    if (q) return d.abbr.toLowerCase().includes(q) || d.name.toLowerCase().includes(q) || d.publisher.toLowerCase().includes(q);
    return true;
  });

  const q = searchInput.value.trim().toLowerCase();
  if (q) {
    filtered.sort((a, b) => {
      const score = d => { if (d.abbr.toLowerCase().includes(q)) return 3; if (d.name.toLowerCase().includes(q)) return 2; if (d.publisher.toLowerCase().includes(q)) return 1; return 0; };
      return score(b) - score(a);
    });
  } else if (activeDirection && !activeType) {
    const order = { 'A': 0, 'B': 1, 'C': 2, '会议': 0, '期刊': 1 };
    filtered.sort((a, b) => (order[a.level] * 2 + order[a.type]) - (order[b.level] * 2 + order[b.type]));
  } else if (activeType) {
    const order = { 'A': 0, 'B': 1, 'C': 2 };
    filtered.sort((a, b) => order[a.level] - order[b.level]);
  } else if (!activeDirection && activeLevels.size === 0 && !q) {
    const order = { 'A': 0, 'B': 1, 'C': 2, '会议': 0, '期刊': 1 };
    filtered.sort((a, b) => (order[a.level] * 2 + order[a.type]) - (order[b.level] * 2 + order[b.type]));
  }

  renderTable();
}

function renderTable() {
  if (filtered.length === 0) {
    tableBody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:40px;color:#999;">没有匹配的条目</td></tr>';
    return;
  }
  let html = '';
  filtered.forEach(d => {
    const nameHtml = d.url ? `<a href="${d.url}" target="_blank" rel="noopener">${d.name}</a>` : d.name;
    html += `<tr class="level-${d.level}">
      <td><span class="${d.type === '会议' ? 'type-badge-conf' : 'type-badge-journal'}">${d.type}</span></td>
      <td><span class="badge badge-${d.level}">${d.level}</span></td>
      <td>${shortDir(d.direction)}</td>
      <td class="abbr">${d.abbr || '-'}</td>
      <td>${nameHtml}</td>
      <td>${d.publisher}</td>
    </tr>`;
  });
  tableBody.innerHTML = html;
}

loadData();
</script>
</body>
</html>
